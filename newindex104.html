import React from 'react';

const BigAnimation = () => {
  const dotCount = 36; // A 6x6 grid for a bigger feel
  const dots = Array.from({ length: dotCount }, (_, i) => (
    <div
      key={i}
      className="w-16 h-16 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-full animate-bounce shadow-xl"
      style={{ animationDelay: `${i * 0.08}s` }}
    ></div>
  ));

  return (
    <div className="min-h-screen flex items-center justify-center bg-gray-950 overflow-hidden p-8">
      <div className="grid grid-cols-6 gap-8 p-8 max-w-6xl mx-auto perspective-1000">
        {dots}
      </div>
    </div>
  );
};

export default BigAnimation;
