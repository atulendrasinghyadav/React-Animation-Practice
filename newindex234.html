          }
        `}
      </style>

      {/* Central Pulsating Core */}
      <div className="relative w-64 h-64 rounded-full bg-gradient-to-br from-indigo-600 to-purple-700 flex items-center justify-center shadow-2xl animate-pulse-scale-grow z-10">
