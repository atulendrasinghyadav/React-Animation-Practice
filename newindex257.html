import React from 'react';

const BigPulsingAnimation = () => {
  const animationStyles = `
    @keyframes pulse-scale {
      0%, 100% {
        transform: scale(1);
        opacity: 0.8;
      }
      50% {
        transform: scale(1.1);
        opacity: 1;
      }
    }
  `;

  return (
    <>
      <style dangerouslySetInnerHTML={{ __html: animationStyles }} />
      <div className="flex items-center justify-center min-h-screen bg-gray-100">
        <div
          className="w-96 h-96 rounded-full bg-gradient-to-r from-blue-500 to-indigo-600 shadow-2xl flex items-center justify-center text-white text-3xl font-bold"
          style={{ animation: 'pulse-scale 3s infinite ease-in-out' }}
        >
          Animate Me
        </div>
      </div>
    </>
  );
};

export default BigPulsingAnimation;
